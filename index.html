<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joshua Brown | Full Stack Developer Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- (The Navigation Bar) -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">JB</div>
            <ul class="nav-menu">
                <li><a href="#home" class="nav-link">Home</a></li>
                <li><a href="#work" class="nav-link">Work</a></li>
                <li><a href="#toolbox" class="nav-link">Toolbox</a></li>
                <li><a href="#about" class="nav-link">About</a></li>
                <li><a href="#contact" class="nav-link">Contact</a></li>
            </ul>
            <div class="hamburger">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </div>

    </nav>

    <!-- Hero Section  -->
    <section id="home" class="hero-section">

        <div class="hero-bento">
            <div class="hero-text">
                <h1 class="kinetic-title">Building the Future of<br><span class="highlight-text">Personal Finance</span>
                </h1>
                <p class="hero-subtitle">Full Stack Software Developer</p>

            </div>
            <div class="hero-accent"></div>
        </div>


    </section>

    <!-- (The Bento Grid) -->
    <section id="work" class="bento-section">
        <div class="bento-container">
            <h2 class="section-title">My Work</h2>


            <!-- (Starting point of Bento Grid) -->

            <div class="bento-grid">
                <!-- Large Tile - Net Worth Calculator -->
                <div class="bento-tile large project-title" date-project="net-worth">
                    <!-- ++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++= -->
                    <div class="tile-content">
                        <h3>Net Worth Calculator</h3>
                        <p>Real-time dashboard for tracking assets, liabilities, and financial growth</p>
                        <div class="tile-metric">
                            <span class="metric-label">Tech Stack</span>
                            <span class="metric-value">React + PostgreSQL</span>
                        </div>
                    </div>
                    <!-- ===================================================================================== -->
                    <div class="tile-footer">
                        <a href="https://github.com/fejide/net-worth-calculator" class="tile-link">View Code</a>
                        <a href="#" class="tile-link">Live Demo</a>

                    </div>

                    <!-- (The Medium Tile - Affordability Calculator) -->

                </div>
            </div>













        </div>
    </section>
</body>

</html>
